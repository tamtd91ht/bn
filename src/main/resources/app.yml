# ============================================================
# Binance Auto-Trading Bot — cấu hình chính (app.yml)
#
# File này được load theo thứ tự:
#   1. <thư mục chứa bot.jar>/app.yml   ← ưu tiên (edit để đổi runtime)
#   2. classpath:/app.yml               ← fallback khi chạy từ IDE / chưa tạo file ngoài
#
# Per-symbol override đặt trong `symbols.yml` cạnh jar (xem ví dụ cuối file).
#
# Secrets (API keys) KHÔNG bỏ vào đây. Set qua env var:
#   BINANCE_API_KEY, BINANCE_API_SECRET, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#
# Hot-reload: sửa file → lưu → bot tự nhận sau vài giây (xem dynamic.hotReload).
# ============================================================

# ========= EXCHANGE =========
exchange:
  # SPOT       = giao ngay (không đòn bẩy, long-only).
  # USDM_FUTURES = USDⓈ-M futures (có đòn bẩy, có thể long/short tuỳ chiến lược).
  mode: SPOT
  # true = dùng testnet (testnet.binance.vision / testnet.binancefuture.com). Key testnet khác key live.
  useTestnet: false
  # Binance reject request nếu timestamp lệch quá recvWindow. 5000ms đủ với VPS đã sync NTP.
  recvWindow: 5000
  # Đòn bẩy. SPOT luôn = 1. Futures: 1-125 (khuyến nghị ≤ 5 cho bot cá nhân).
  leverage: 1
  # Chỉ áp dụng khi mode=USDM_FUTURES.
  # ISOLATED = mỗi vị thế có margin riêng (an toàn, khuyến nghị).
  # CROSSED  = dùng chung toàn bộ số dư → thua 1 vị thế có thể kéo các vị thế khác.
  marginType: ISOLATED
  # ONE_WAY = mỗi symbol 1 chiều (khuyến nghị).
  # HEDGE   = cho phép long+short cùng symbol. Chưa hỗ trợ ở v1.
  positionMode: ONE_WAY

# ========= TÍN HIỆU (EMA/RSI) =========
signals:
  emaShort: 20
  emaLong: 50
  rsiPeriod: 14
  # Watchlist entry: chỉ mua khi RSI ∈ [rsiEntryMin, rsiEntryMax] (tránh đỉnh/trend yếu).
  rsiEntryMin: 40
  rsiEntryMax: 65
  # Bottom reversal: RSI phải từng < rsiOversoldEnter rồi hồi qua rsiOversoldExit.
  rsiOversoldEnter: 30
  rsiOversoldExit: 35
  # |EMA20-EMA50|/giá < ngưỡng này (%) → sideway.
  sidewayEmaGapPct: 0.3
  # Số nến gần nhất để confirm slope EMA20 (regression).
  slopeConfirmBars: 3
  # STRONG_WAVE 4h: nếu RSI 4h hiện tại > X → reject (tránh mua đỉnh sóng).
  # 70 = overbought zone, 65 chặt hơn, 0 = tắt filter.
  strongWaveRsiMax: 70

# ========= EXIT (TP/SL) =========
# Có thể override per-symbol qua symbols.yml (vd coin biến động cao muốn TP/SL xa hơn).
exit:
  takeProfitPct: 5.0               # TP lần 1 (% so giá entry)
  partialTpRatio: 0.5              # TP lần 1 và trend còn UP → bán 50%, giữ 50% chờ TP kế
  trailingTpStepPct: 3.0           # Mỗi lần partial TP, nâng ngưỡng TP kế +3%
  stopLossPct: 4.0                 # SL (% so giá entry). Altcoin biến động → nới 4% để tránh wick false.
  maxDropChecks: 1                 # Dính SL là bán ngay, KHÔNG chờ tick sau. Altcoin cascade dump → cắt quyết liệt.
  recoveryResetPct: -2.0           # Hồi về > ngưỡng này → reset dropCheckCount (match với SL mới)
  breakevenAfterPartialTp: true    # Sau partial TP dời SL về breakeven
  cooldownAfterLossHours: 4        # Sau stop-loss không mua lại coin đó trong N giờ
  # --- TRAILING TP (high-water mark) ---
  # Bảo vệ lãi đã đạt khi pnl tụt khỏi đỉnh - tránh case "lên 4% rồi rơi về 0".
  # Logic: pnl từng đạt ≥ trailingArmPct (armed) AND drop từ đỉnh ≥ trailingDropPct → bán ngay.
  trailingArmPct: 2.0              # Lãi từ 2% trở lên mới enable trailing
  trailingDropPct: 1.0             # Tụt ≥ 1% khỏi đỉnh → SELL toàn bộ
                                   # Cả 2 = 0 hoặc null → tắt trailing.

# ========= CAPITAL =========
capital:
  reservePct: 0.20                     # % vốn gốc giữ làm reserveFund (dùng cho scanner opportunity)
  v0SnapshotEveryHours: 24             # Mỗi 24h snapshot lại v0 (chỉ khi không có position mở)
  minTradeSizeUsdt: 10.0               # Lệnh < số này sẽ bị skip (tránh phí cao)
  reserveAllocPerOpportunityUsdt: 50.0 # Trần mỗi lần rút reserveFund vào 1 coin scanner

# ========= RISK =========
risk:
  dailyDrawdownPct: 0.10               # Equity giảm > 10% trong ngày → kill-switch. Altcoin biến động mạnh, 5% quá chặt dễ false-trigger.
  pauseHours: 24                       # Kill-switch pause trong N giờ
  maxConcurrentPositions: 3            # Với vốn ~38 USDT + minTradeSize=10 + reservePct=20% → chỉ đủ 3 lệnh đồng thời
  maxPnlPctEligibleForRebalance: 2.0   # Coin có pnl < X% + trend không tăng → có thể rebalance bán
  # --- FUTURES ONLY ---
  liquidationBufferPct: 30             # Lỗ max cho phép = 30% khoảng cách (entry → liqPrice)
  maxExposurePctOfEquity: 80           # Tổng notional mở <= 80% equity (tránh overleverage)
  fundingGuardEnabled: true
  fundingMaxAcceptablePctPer8h: 0.05   # Funding > 0.05%/8h (~5.5%/tháng) → không mở long mới
  killSwitchHysteresisTicks: 3         # Cần drawdown ≥ ngưỡng trong N tick LIÊN TIẾP mới fire.
                                       # 1 = nhạy (như cũ, dễ false trigger từ wick).
                                       # 3 = cần ~3 phút liên tục lỗ (với fastTickSeconds=60).

# ========= WATCHLIST =========
watchlist:
  buyOnStart: false                    # true = mua ngay khi start nếu thoả entry. false = chờ crossover mới.
  symbols: []                          # Để trống → bot dựa hoàn toàn scanner. Muốn ép vài coin thì thêm vào đây, vd: [SOLUSDT, AVAXUSDT]

# ========= SCANNER =========
scanner:
  enabled: true                         # false = reserveFund đóng băng, chỉ trade watchlist
  topN: 30
  minQuoteVolume24hUsdt: 50000000       # Volume 24h tối thiểu để xét (loại coin thanh khoản thấp)
  blacklist:
    - BTCUSDT
    - ETHUSDT
    - BNBUSDT
    - BTCDOMUSDT
    - USDCUSDT
    - FDUSDUSDT
    - BUSDUSDT
    - TUSDUSDT
    - USD1USDT
    - RLUSDUSDT

# ========= TIMEFRAMES =========
timeframes:
  primary: 1h                           # 15m | 30m | 1h | 2h | 4h
  confirm: 4h                           # Xác nhận trend lớn cho scanner

# ========= SCHEDULING =========
scheduling:
  tickMinutes: 15                       # Chu kỳ tick chính (check TP/SL/scan + scanner + entry)
  fastTickSeconds: 60                   # Fast loop chỉ check positions (TP/SL) mỗi N giây.
                                        # 0 = tắt → chỉ tick chính như v1. Khuyến nghị 60s để
                                        # SL phản ứng nhanh khi giá dump (tránh case lệch -3% như APE).
                                        # Mỗi fast-tick tốn ~30 weight (1 ticker + 1 klines /position).
  entryGracePeriodSeconds: 120          # Sau entry, skip SL check trong N giây để tránh fast-tick
                                        # bán ngay nếu giá slip lúc fill. 0 = check ngay.
  cleanupHourVN: 2                      # Giờ (VN) xoá JSONL cũ
  dailyReportHourVN: 8                  # Giờ (VN) gửi báo cáo Telegram

# ========= STORAGE =========
storage:
  dataDir: ./data                       # state.json + trades/orders/signals/equity jsonl
  keepDays: 30

# ========= LOGGING =========
logging:
  console: true
  file: true
  level: INFO                           # DEBUG | INFO | WARN | ERROR

# ========= TELEGRAM =========
telegram:
  enabled: true
  # Các event nhận alert (bỏ event nào không cần).
  # Loại: ENTRY, PARTIAL_TP, FULL_TP, STOP_LOSS, KILL_SWITCH, REBALANCE,
  #       OPPORTUNITY_MISSED, LIQUIDATION_WARN, FUNDING_HIGH,
  #       CONFIG_RELOADED, ERROR, DAILY_REPORT, APP_START, APP_STOP
  alertEvents:
    - ENTRY
    - PARTIAL_TP
    - FULL_TP
    - STOP_LOSS
    - KILL_SWITCH
    - REBALANCE
    - OPPORTUNITY_MISSED
    - LIQUIDATION_WARN
    - FUNDING_HIGH
    - CONFIG_RELOADED
    - ERROR
    - DAILY_REPORT
    - APP_START
    - APP_STOP

# ========= PAPER-TRADE (DRY-RUN) =========
# Khi enabled=true: bot KHÔNG gọi endpoint trade thật của Binance. Mua/bán được giả lập
# trên số dư ảo lưu ở data/paper_account.json. Giá fill lấy real-time từ ticker public,
# áp slippage + fee để mô phỏng. Vẫn ghi log/JSONL/Telegram bình thường để đánh giá hiệu quả.
#
# Mục đích: chạy thử chiến lược một thời gian xem có lợi nhuận trước khi đưa vào trade thật.
# Khi muốn đổi về live: đặt enabled=false, xoá data/paper_account.json (tuỳ ý), restart.
paperTrade:
  enabled: true                          # true = paper-trade (mặc định để đánh giá), false = trade thật
  initialUsdtBalance: 100.0              # Vốn ảo USDT khi tạo paper account lần đầu
  feeRate: 0.001                         # Phí mỗi lệnh (0.1% = Spot taker fee chuẩn của Binance)
  slippagePct: 0.05                      # Slippage giả lập (% so ticker). Buy ăn cao hơn, sell thấp hơn.

# ========= RECOVERY / REHYDRATE =========
# Khi bật + state.json trống (user xoá ./data) + ví có coin → bot tạo Position
# với entryPrice = giá hiện tại lúc start ("coi như mua lại"). TP/SL/trailing sẽ
# manage forward từ mốc đó. Bot KHÔNG biết entry thật trước đó.
#
# RỦI RO: coin user đang hodl dài hạn sẽ bị bot manage → có thể bán ở partial TP.
# Default false để đảm bảo an toàn - user phải chủ động bật.
recovery:
  rehydrateOnStart: false              # true = rehydrate khi detect orphan
  minAssetValueUsdt: 1.0               # Coin < 1 USDT giá trị: skip (dust)
  onlyWhenStateEmpty: true             # Chỉ chạy khi state.positions rỗng

# ========= DYNAMIC CONFIG =========
dynamic:
  hotReload: true                       # true = sửa file YAML bot tự reload
  reloadDebounceMs: 2000                # Gom các event ghi file liên tiếp
  telegramControl: true                 # true = nhận lệnh /pause /resume /reload /closeAll /status qua Telegram

# ========= PER-SYMBOL OVERRIDE (tuỳ chọn) =========
# Thường để trống. Nếu muốn override riêng từng coin → tạo file symbols.yml
# cạnh jar với dạng:
#
#   DOGEUSDT:
#     leverage: 3
#     exit:
#       takeProfitPct: 8.0
#       stopLossPct: 4.0
#
# File symbols.yml sẽ override field `symbols` dưới đây.
symbols: {}
